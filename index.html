<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>تابلوی کنترل ESP32</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/5.3.4/mqtt.min.js"></script>
<style>
  :root{
    --bg: #1B1D21;
    --panel: #24272C;
    --panel-raised: #2C2F35;
    --hazard: #F2B90C;
    --hazard-dim: #8a6d0c;
    --on: #3ECF8E;
    --off: #E85C4A;
    --text: #ECE9E2;
    --text-dim: #8B8F94;
    --mono: 'IBM Plex Mono', 'Courier New', monospace;
    --sans: 'Space Grotesk', 'Segoe UI', sans-serif;
  }
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

  *{box-sizing:border-box;}
  body{
    margin:0; min-height:100vh; background:var(--bg); color:var(--text);
    font-family:var(--sans);
    padding:16px; padding-bottom:40px;
  }

  .frame{
    max-width:460px; margin:0 auto;
    border:1px solid #3a3e45; border-radius:14px;
    background:
      repeating-linear-gradient(135deg, transparent 0 10px, rgba(242,185,12,0.035) 10px 20px),
      var(--panel);
    padding:18px 16px 24px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.03);
  }

  .header{
    display:flex; align-items:center; justify-content:space-between;
    border-bottom:2px dashed #3a3e45; padding-bottom:14px; margin-bottom:18px;
  }
  .header h1{
    font-size:16px; font-weight:700; letter-spacing:0.5px; margin:0;
  }
  .header .sub{ font-size:11px; color:var(--text-dim); font-family:var(--mono); margin-top:2px;}

  .pilot{
    display:flex; align-items:center; gap:8px;
    font-family:var(--mono); font-size:11px; color:var(--text-dim);
  }
  .led{
    width:11px; height:11px; border-radius:50%;
    background:var(--off);
    box-shadow: 0 0 4px 1px rgba(232,92,74,0.5);
    transition: background .3s, box-shadow .3s;
  }
  .led.on{
    background:var(--on);
    box-shadow: 0 0 7px 2px rgba(62,207,142,0.7);
    animation: pulse 2s infinite;
  }
  @keyframes pulse{
    0%,100%{opacity:1;} 50%{opacity:.55;}
  }

  .section-label{
    font-family:var(--mono); font-size:10.5px; letter-spacing:1.5px;
    color:var(--hazard); text-transform:uppercase; margin:22px 0 10px;
    display:flex; align-items:center; gap:8px;
  }
  .section-label::after{
    content:""; flex:1; height:1px;
    background:repeating-linear-gradient(90deg, var(--hazard-dim) 0 4px, transparent 4px 8px);
  }

  .gauges{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .gauge{
    background:var(--panel-raised); border-radius:10px; padding:12px 14px;
    border:1px solid #3a3e45;
  }
  .gauge .label{ font-size:11px; color:var(--text-dim); }
  .gauge .value{
    font-family:var(--mono); font-size:26px; font-weight:600; margin-top:2px;
  }
  .gauge .unit{ font-size:13px; color:var(--text-dim); }

  .switch-row{
    display:flex; align-items:center; justify-content:space-between;
    background:var(--panel-raised); border:1px solid #3a3e45;
    border-radius:10px; padding:12px 14px; margin-bottom:10px;
  }
  .switch-row .name{ font-size:13.5px; font-weight:600; }
  .switch-row .tag{ font-family:var(--mono); font-size:10px; color:var(--text-dim); margin-top:1px; }

  .rocker{
    position:relative; width:58px; height:30px; border-radius:6px;
    background:#15171a; border:1px solid #40444b; cursor:pointer;
    box-shadow: inset 0 2px 4px rgba(0,0,0,0.6);
  }
  .rocker .knob{
    position:absolute; top:2px; right:2px; width:26px; height:24px;
    border-radius:4px; background:linear-gradient(180deg,#4b5058,#33363b);
    border:1px solid #55595f;
    transition: right .18s ease;
    display:flex; align-items:center; justify-content:center;
    font-family:var(--mono); font-size:9px; color:var(--text-dim);
  }
  .rocker.on .knob{
    right:30px; background:linear-gradient(180deg,#4fdca0,#2a9d68);
    border-color:#3ecf8e; color:#0d1f16;
  }
  .rocker.on{ box-shadow: inset 0 2px 4px rgba(0,0,0,0.6), 0 0 8px rgba(62,207,142,0.35); }

  footer{
    text-align:center; margin-top:18px; font-family:var(--mono);
    font-size:10px; color:var(--text-dim);
  }
</style>
</head>
<body>

<div class="frame">
  <div class="header">
    <div>
      <h1>تابلوی کنترل ESP32</h1>
      <div class="sub" id="deviceLabel">home/esp32-01</div>
    </div>
    <div class="pilot">
      <span id="statusText">در حال اتصال</span>
      <span class="led" id="statusLed"></span>
    </div>
  </div>

  <div class="section-label">سنسورها</div>
  <div class="gauges">
    <div class="gauge">
      <div class="label">دما</div>
      <div class="value" id="tempVal">--<span class="unit">°C</span></div>
    </div>
    <div class="gauge">
      <div class="label">رطوبت</div>
      <div class="value" id="humVal">--<span class="unit">%</span></div>
    </div>
  </div>

  <div class="section-label">رله‌ها</div>
  <div id="relayContainer"></div>

  <div class="section-label">پین‌های عمومی</div>
  <div id="gpioContainer"></div>

  <footer>MQTT / TLS · WebSocket · قابل استفاده از هر جا</footer>
</div>

<script>
// ---------- تنظیمات (این بخش را با اطلاعات بروکر خودتان جایگزین کنید) ----------
const MQTT_HOST   = "279d1c30c53e417b9a7355326f379152.s1.eu.hivemq.cloud"; // آدرس کلاستر HiveMQ Cloud
const MQTT_WS_PORT = 8884;                          // پورت WebSocket امن
const MQTT_USER   = "ESP32-01";
const MQTT_PASS   = "ESP32.23";
const DEVICE_ID   = "esp32-01";
const TOPIC_BASE  = `home/${DEVICE_ID}`;

document.getElementById('deviceLabel').textContent = TOPIC_BASE;

const RELAYS = [
  { key: "relay1", name: "رله ۱" },
  { key: "relay2", name: "رله ۲" },
  { key: "relay3", name: "رله ۳" },
  { key: "relay4", name: "رله ۴" },
];
const GPIOS = [
  { key: "gpioA", name: "پین عمومی A" },
  { key: "gpioB", name: "پین عمومی B" },
];

function buildRow(container, item) {
  const row = document.createElement('div');
  row.className = 'switch-row';
  row.innerHTML = `
    <div>
      <div class="name">${item.name}</div>
      <div class="tag">${TOPIC_BASE}/control/${item.key}</div>
    </div>
    <div class="rocker" id="rocker-${item.key}">
      <div class="knob"></div>
    </div>`;
  container.appendChild(row);

  const rocker = row.querySelector('.rocker');
  rocker.addEventListener('click', () => {
    const turningOn = !rocker.classList.contains('on');
    publishCommand(item.key, turningOn);
  });
}

RELAYS.forEach(r => buildRow(document.getElementById('relayContainer'), r));
GPIOS.forEach(g => buildRow(document.getElementById('gpioContainer'), g));

function setRockerState(key, on) {
  const el = document.getElementById(`rocker-${key}`);
  if (el) el.classList.toggle('on', on);
}

function setConnected(connected) {
  document.getElementById('statusLed').classList.toggle('on', connected);
  document.getElementById('statusText').textContent = connected ? "متصل" : "قطع";
}

function publishCommand(key, on) {
  const topic = `${TOPIC_BASE}/control/${key}`;
  client.publish(topic, on ? "ON" : "OFF");
  // واکنش فوری در رابط کاربری؛ تاییدیه نهایی از تاپیک state می‌آید
  setRockerState(key, on);
}

// ---------- اتصال MQTT از طریق WebSocket ----------
const client = mqtt.connect(`wss://${MQTT_HOST}:${MQTT_WS_PORT}/mqtt`, {
  username: MQTT_USER,
  password: MQTT_PASS,
  clientId: `webpanel_${Math.random().toString(16).slice(2)}`,
  reconnectPeriod: 3000,
});

client.on('connect', () => {
  setConnected(true);
  client.subscribe(`${TOPIC_BASE}/state/#`);
  client.subscribe(`${TOPIC_BASE}/sensor/#`);
  client.subscribe(`${TOPIC_BASE}/status`);
});

client.on('reconnect', () => setConnected(false));
client.on('close', () => setConnected(false));
client.on('offline', () => setConnected(false));

client.on('message', (topic, payload) => {
  const value = payload.toString();
  const parts = topic.split('/');
  const kind = parts[2]; // state | sensor | status
  const key  = parts[3];

  if (kind === 'state') {
    setRockerState(key, value === 'ON');
  } else if (kind === 'sensor') {
    if (key === 'temp') document.getElementById('tempVal').innerHTML = `${value}<span class="unit">°C</span>`;
    if (key === 'hum')  document.getElementById('humVal').innerHTML  = `${value}<span class="unit">%</span>`;
  }
});
</script>

</body>
</html>
